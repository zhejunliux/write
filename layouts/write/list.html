{{ define "main" }}
<content>
  <ul class="blog-posts">
    {{ range (where .Site.RegularPages "Section" "write").ByDate.Reverse }}
    <li>
      <span>
        <i>
          <time datetime='{{ .Date.Format "2006-01-02" }}' pubdate>
            {{ .Date.Format (default "2006-01-02" .Site.Params.dateFormat) }}
          </time>
        </i>
      </span>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ else }}
    <li>{{ i18n "no-posts" }}</li>
    {{ end }}
  </ul>
</content>
{{ end }}
